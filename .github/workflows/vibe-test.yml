# VIBE Service - CI Test Pipeline
# Runs pytest on push/PR targeting main branch (services/vibe/** changes only)

name: VIBE Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/vibe/**'
      - '.github/workflows/vibe-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/vibe/**'
      - '.github/workflows/vibe-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/vibe

    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: services/vibe/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --co -q 2>/dev/null | tail -1
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml
        env:
          PYTHONPATH: .
          DB_PATH: ":memory:"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: services/vibe/coverage.xml
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/vibe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff check
        run: ruff check app/ --output-format=github || true

      - name: Run ruff format check
        run: ruff format --check app/ || true

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (test target)
        uses: docker/build-push-action@v6
        with:
          context: services/vibe
          target: production
          push: false
          tags: ufs-vibe:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
