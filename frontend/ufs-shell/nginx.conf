server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy APIs to respective backends
    location /api/vibe/ {
        proxy_pass http://vibe:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/bocchi/ {
        proxy_pass http://lab-studio:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/eng-ops/ {
        proxy_pass http://engineering-ops:8003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/life/ {
        proxy_pass http://life-master:8004/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://master-core:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # VIBE dashboard assets (iframe loads HTML from /svc/vibe/ but
    # the built HTML references assets at absolute path /ui/assets/...)
    location /ui/ {
        proxy_pass http://vibe:8001/ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend service proxies (iframe targets)
    location /svc/bocchi/ {
        proxy_pass http://bocchi-frontend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /svc/vibe/ {
        proxy_pass http://vibe:8001/ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /svc/life/ {
        proxy_pass http://life-master:8004/ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Session Manager (Claude Web UI) — 호스트에서 직접 실행 (Claude CLI + 파일시스템 필요)
    # host.docker.internal = Docker에서 호스트 머신 접근
    location /svc/claude/ {
        resolver 127.0.0.11 valid=30s;
        set $session_mgr http://host.docker.internal:8006;
        rewrite ^/svc/claude/(.*) /$1 break;
        proxy_pass $session_mgr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
    }

    location /api/claude/ {
        resolver 127.0.0.11 valid=30s;
        set $session_mgr_api http://host.docker.internal:8006;
        rewrite ^/api/claude/(.*) /$1 break;
        proxy_pass $session_mgr_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
    }
}
