server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Serve from sub-path (when embedded in UFS Shell via /svc/bocchi/)
    location /svc/bocchi/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /svc/bocchi/index.html;
    }

    # Standalone root fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to lab-studio backend
    location /api/ {
        proxy_pass http://lab-studio:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
