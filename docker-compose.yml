services:
  # ============================================
  # Level 0: Master Core (API Gateway)
  # ============================================
  master-core:
    build: ./master-core
    container_name: ufs-master-core
    ports:
      - "8000:8000"
    environment:
      - SERVICE_NAME=master-core
      - VIBE_URL=http://vibe:8001
      - LAB_STUDIO_URL=http://lab-studio:8002
      - ENGINEERING_OPS_URL=http://engineering-ops:8003
      - LIFE_MASTER_URL=http://life-master:8004
    env_file:
      - .env
    depends_on:
      vibe:
        condition: service_healthy
      lab-studio:
        condition: service_healthy
      engineering-ops:
        condition: service_healthy
      life-master:
        condition: service_healthy
    networks:
      - ufs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # MCP Server (SSE transport for HTTP-based MCP clients)
  mcp-server:
    build: ./master-core
    container_name: ufs-mcp-server
    ports:
      - "127.0.0.1:8005:8005"
    environment:
      - SERVICE_NAME=mcp-server
      - VIBE_URL=http://vibe:8001
      - LAB_STUDIO_URL=http://lab-studio:8002
      - ENGINEERING_OPS_URL=http://engineering-ops:8003
      - LIFE_MASTER_URL=http://life-master:8004
    env_file:
      - .env
    command: ["python", "-m", "app.mcp_server", "--sse"]
    depends_on:
      vibe:
        condition: service_healthy
      life-master:
        condition: service_healthy
    networks:
      - ufs-network
    restart: unless-stopped

  # ============================================
  # Level 1: Sub-Projects
  # ============================================
  vibe:
    build:
      context: ./services/vibe
      target: production
    container_name: ufs-vibe
    ports:
      - "8001:8001"
    environment:
      - SERVICE_NAME=vibe
      - SERVICE_PORT=8001
    env_file:
      - .env
    volumes:
      - vibe-data:/app/data
      - vibe-backups:/app/data/backups
    networks:
      - ufs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  lab-studio:
    build: ./services/lab-studio
    container_name: ufs-lab-studio
    ports:
      - "8002:8002"
    environment:
      - SERVICE_NAME=lab-studio
      - SERVICE_PORT=8002
    env_file:
      - .env
    volumes:
      - lab-studio-data:/app/data
    networks:
      - ufs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  engineering-ops:
    build: ./services/engineering-ops
    container_name: ufs-engineering-ops
    ports:
      - "8003:8003"
    environment:
      - SERVICE_NAME=engineering-ops
      - SERVICE_PORT=8003
    env_file:
      - .env
    volumes:
      - engineering-ops-data:/app/data
    networks:
      - ufs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  life-master:
    build: ./services/life-master
    container_name: ufs-life-master
    ports:
      - "8004:8004"
    environment:
      - SERVICE_NAME=life-master
      - SERVICE_PORT=8004
    env_file:
      - .env
    volumes:
      - life-master-data:/app/data
    networks:
      - ufs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # session-manager: 호스트에서 직접 실행 (Claude CLI + 호스트 파일시스템 접근 필요)
  # 시작: cd services/session-manager && python -m app.main
  # nginx는 host.docker.internal:8006으로 프록시

  # ============================================
  # Frontends
  # ============================================
  ufs-shell:
    build: ./frontend/ufs-shell
    container_name: ufs-shell
    ports:
      - "3000:3000"
    environment:
      - SERVICE_NAME=ufs-shell
    networks:
      - ufs-network
    restart: unless-stopped
    depends_on:
      master-core:
        condition: service_started

  bocchi-frontend:
    build: ./frontend/bocchi-master
    container_name: ufs-bocchi-frontend
    ports:
      - "3001:3000"
    environment:
      - SERVICE_NAME=bocchi-frontend
    networks:
      - ufs-network
    restart: unless-stopped
    depends_on:
      lab-studio:
        condition: service_healthy

# ============================================
# Shared Resources
# ============================================
volumes:
  vibe-data:
  vibe-backups:
  lab-studio-data:
  engineering-ops-data:
  life-master-data:

networks:
  ufs-network:
    driver: bridge
